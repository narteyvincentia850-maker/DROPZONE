function fmt(usd, cur) {
  const ghs = (usd * USD_TO_GHS).toFixed(2);
  if (cur === "USD") return "$" + usd.toFixed(2);
  if (cur === "GHS") return "GH\u20B5" + ghs;
  return "$" + usd.toFixed(2) + " \u00B7 GH\u20B5" + ghs;
}

function toPesewas(usd) {
  return Math.round(usd * USD_TO_GHS * 100);
}

function badgeColor(b) {
  if (b === "Sale") return "#ef4444";
  if (b === "Hot") return "#ff4d00";
  if (b === "New") return "#10b981";
  if (b === "Premium") return "#8b5cf6";
  if (b === "Popular") return "#0ea5e9";
  return "#f59e0b";
}

                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                    <button onClick={() => onRemove(item.key)} style={{background:"transparent",border:"none",color:"#333",fontSize:12,cursor:"pointer"}}>✕</button>
                    <div style={{display:"flex",alignItems:"center",gap:4,background:"#1a1a1a",borderRadius:7,overflow:"hidden"}}>
                      <button onClick={() => onQty(item.key, item.qty - 1)} style={{background:"transparent",border:"none",color:"#ff4d00",padding:"4px 8px",cursor:"pointer",fontSize:14,fontWeight:700}}>−</button>
                      <span style={{fontSize:12,color:"#fff",minWidth:16,textAlign:"center"}}>{item.qty}</span>
                      <button onClick={() => onQty(item.key, item.qty + 1)} style={{background:"transparent",border:"none",color:"#ff4d00",padding:"4px 8px",cursor:"pointer",fontSize:14,fontWeight:700}}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:"16px 20px",borderTop:"1px solid #1a1a1a",display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",gap:8}}>
                <input value={code} onChange={e => setCode(e.target.value)} placeholder="Discount code" style={{flex:1,background:"#161616",border:"1px solid #222",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:12,outline:"none"}} />
                <button onClick={applyCode} style={{background:"#1a1a1a",border:"1px solid #222",borderRadius:8,color:"#ff4d00",fontSize:11,fontWeight:700,padding:"8px 12px",cursor:"pointer"}}>APPLY</button>
              </div>
              {codeMsg && <div style={{fontSize:11,color:discount > 0 ? "#10b981" : "#ef4444"}}>{codeMsg}</div>}
              {discount > 0 && (
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#555"}}>
                  <span>Discount ({Math.round(discount*100)}%)</span>
                  <span style={{color:"#10b981"}}>−{fmt(total * discount, currency)}</span>
                </div>
              )}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:"#777"}}>Total</span>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:"#ff4d00",letterSpacing:1}}>{fmt(finalTotal, currency)}</span>
              </div>
              <button onClick={() => setStep("checkout")} style={{background:"#ff4d00",border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:13,padding:"13px",cursor:"pointer",letterSpacing:1}}>
                CHECKOUT →
              </button>
            </div>
          </>
        ) : (
          <div style={{padding:"20px",display:"flex",flexDirection:"column",gap:12}}>
            <button onClick={() => setStep("cart")} style={{background:"transparent",border:"none",color:"#555",fontSize:12,cursor:"pointer",textAlign:"left",padding:0,marginBottom:4}}>← Back to cart</button>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:"#fff",letterSpacing:2,marginBottom:4}}>SHIPPING DETAILS</div>
            {[
              {label:"Full Name *", val:name, set:setName, ph:"Your name"},
              {label:"Email *", val:email, set:setEmail, ph:"your@email.com"},
              {label:"Phone", val:phone, set:setPhone, ph:"+233..."},
              {label:"Delivery Address *", val:address, set:setAddress, ph:"City, Region, Ghana"},
            ].map(f => (
              <div key={f.label} style={{display:"flex",flexDirection:"column",gap:4}}>
                <label style={{fontSize:10,color:"#555",textTransform:"uppercase",letterSpacing:1}}>{f.label}</label>
                <input value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.ph} style={{background:"#161616",border:"1px solid #222",borderRadius:8,padding:"9px 12px",color:"#e2e8f0",fontSize:13,outline:"none"}} />
              </div>
            ))}
            <div style={{background:"#161616",border:"1px solid #1e1e1e",borderRadius:10,padding:"12px",marginTop:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:12,color:"#555"}}>Order Total</span>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:"#ff4d00"}}>{fmt(finalTotal, currency)}</span>
              </div>
            </div>
            <button onClick={pay} style={{background:"#ff4d00",border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:13,padding:"14px",cursor:"pointer",letterSpacing:1,marginTop:4}}>
              PAY WITH PAYSTACK
            </button>
            <p style={{fontSize:10,color:"#333",textAlign:"center"}}>🔒 Secured by Paystack · Payments in GHS</p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── PRODUCT DETAIL ── */
function ProductDetail({ p, currency, onAdd, onBack, wishlist, onWishlist }) {
  const [activeImg, setActiveImg] = React.useState(0);
  const [selColor, setSelColor] = React.useState(p.colors[0] || "");
  const inWish = wishlist.includes(p.id);
  const savings = p.originalPrice ? p.originalPrice - p.price : 0;

  return (
    <div style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}} className="fade-up">
      <button onClick={onBack} style={{background:"transparent",border:"none",color:"#555",fontSize:12,cursor:"pointer",marginBottom:16,display:"flex",alignItems:"center",gap:6}}>
        ← Back to products
      </button>
      <div style={{display:"flex",gap:24,flexWrap:"wrap"}}>
        {/* Images */}
        <div style={{flex:"1 1 300px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{aspectRatio:"1/1",background:"#111",borderRadius:16,overflow:"hidden",border:"1px solid #1a1a1a"}}>
            <img src={p.images[activeImg]} alt={p.name} style={{width:"100%",height:"100%",objectFit:"cover"}} />
          </div>
          {p.images.length > 1 && (
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {p.images.map((img, idx) => (
                <div key={idx} className="thumb" onClick={() => setActiveImg(idx)} style={{width:56,height:56,borderRadius:8,overflow:"hidden",border:`2px solid ${activeImg===idx?"#ff4d00":"#1a1a1a"}`,cursor:"pointer",transition:"border-color .2s",flexShrink:0}}>
                  <img src={img} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} />
                </div>
              ))}
            </div>
          )}
        </div>
        {/* Info */}
        <div style={{flex:"1 1 300px",display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:10,color:"#444",textTransform:"uppercase",letterSpacing:2,marginBottom:4}}>{p.brand} · {p.category}</div>
            <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#fff",letterSpacing:2,lineHeight:1.1,marginBottom:8}}>{p.name}</h1>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Stars rating={p.rating} />
              <span style={{fontSize:11,color:"#555"}}>{p.rating} ({p.reviews} reviews)</span>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"baseline",gap:12}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,color:"#ff4d00",letterSpacing:1}}>{fmt(p.price, currency)}</span>
            {p.originalPrice && (
              <div style={{display:"flex",flexDirection:"column"}}>
                <span style={{fontSize:13,color:"#333",textDecoration:"line-through"}}>{fmt(p.originalPrice, currency)}</span>
                <span style={{fontSize:10,color:"#10b981"}}>Save {fmt(savings, currency)}</span>
              </div>
            )}
          </div>
          <p style={{fontSize:13,color:"#777",lineHeight:1.8}}>{p.description}</p>
          {p.colors.length > 0 && (
            <div>
              <div style={{fontSize:10,color:"#444",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Option / Variant</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {p.colors.map(c => (
                  <button key={c} onClick={() => setSelColor(c)} style={{background:selColor===c?"#ff4d00":"#1a1a1a",border:`1px solid ${selColor===c?"#ff4d00":"#2a2a2a"}`,borderRadius:8,color:selColor===c?"#fff":"#888",fontSize:12,padding:"7px 16px",cursor:"pointer",fontWeight:600,transition:"all .15s"}}>
                    {c}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={{background:"#111",border:"1px solid #1a1a1a",borderRadius:12,padding:"14px",display:"flex",flexDirection:"column",gap:6}}>
            {p.specs.map((s, i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:"#666"}}>
                <span style={{color:"#ff4d00",fontSize:8}}>●</span>{s}
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="addBtn" onClick={() => onAdd(p, selColor)} style={{flex:1,background:"#ff4d00",border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:13,padding:"14px",cursor:"pointer",letterSpacing:1,transition:"background .2s"}}>
              ADD TO CART
            </button>
            <button onClick={() => onWishlist(p.id)} style={{background:"#1a1a1a",border:"1px solid #222",borderRadius:10,padding:"14px 18px",fontSize:18,cursor:"pointer"}}>
              {inWish ? "❤️" : "🤍"}
            </button>
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            {["🚚 Fast Delivery","🔒 Secure Payment","↩️ Easy Returns"].map(t => (
              <span key={t} style={{fontSize:10,color:"#444",background:"#111",border:"1px solid #1a1a1a",borderRadius:99,padding:"4px 10px"}}>{t}</span>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ORDER SUCCESS ── */
function OrderSuccess({ onHome }) {
  return (
    <div style={{minHeight:"60vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:20,textAlign:"center"}} className="fade-up">
      <div style={{fontSize:64}}>✅</div>
      <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color:"#fff",letterSpacing:2}}>ORDER CONFIRMED!</h2>
      <p style={{fontSize:14,color:"#555",maxWidth:320,lineHeight:1.8}}>
        Thank you for shopping with Dropzone! Your payment was received and your order is being processed.
      </p>
      <button onClick={onHome} style={{background:"#ff4d00",border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:13,padding:"12px 28px",cursor:"pointer",letterSpacing:1,marginTop:8}}>
        CONTINUE SHOPPING
      </button>
    </div>
  );
}

/* ── MAIN APP ── */
function App() {
  const [cart, setCart] = React.useState([]);
  const [currency, setCurrency] = React.useState("Both");
  const [category, setCategory] = React.useState("All");
  const [search, setSearch] = React.useState("");
  const [selected, setSelected] = React.useState(null);
  const [cartOpen, setCartOpen] = React.useState(false);
  const [wishlist, setWishlist] = React.useState([]);
  const [toast, setToast] = React.useState(null);
  const [sortBy, setSortBy] = React.useState("default");
  const [orderDone, setOrderDone] = React.useState(false);
  const [banner, setBanner] = React.useState(true);

  const showToast = (msg, color) => {
    setToast({ msg, color: color || "#ff4d00" });
    setTimeout(() => setToast(null), 3000);
  };

  const addToCart = (p, color) => {
    const c = color || "";
    setCart(prev => {
      const key = String(p.id) + c;
      const ex = prev.find(i => i.key === key);
      if (ex) return prev.map(i => i.key === key ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...p, qty: 1, key, selectedColor: c }];
    });
    showToast("✓ " + p.name + " added to cart");
  };

  const removeFromCart = (key) => setCart(prev => prev.filter(i => i.key !== key));
  const updateQty = (key, qty) => {
    if (qty < 1) removeFromCart(key);
    else setCart(prev => prev.map(i => i.key === key ? { ...i, qty } : i));
  };
  const toggleWishlist = (id) => setWishlist(prev => prev.includes(id) ? prev.filter(w => w !== id) : [...prev, id]);

  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);

  const filtered = PRODUCTS
    .filter(p => category === "All" || p.category === category)
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      if (sortBy === "price-asc") return a.price - b.price;
      if (sortBy === "price-desc") return b.price - a.price;
      if (sortBy === "rating") return b.rating - a.rating;
      return 0;
    });

  const goHome = () => { setSelected(null); setOrderDone(false); window.scrollTo(0, 0); };
  const openProduct = (p) => { setSelected(p); window.scrollTo(0, 0); };

  return (
    <div style={{minHeight:"100vh",background:"#0c0c0c",color:"#e2e8f0"}}>
      {banner && <OfferBanner onClose={() => setBanner(false)} />}

      {/* HEADER */}
      <header style={{background:"#0c0c0c",borderBottom:"1px solid #1a1a1a",position:"sticky",top:0,zIndex:50}}>
        <div style={{maxWidth:1280,margin:"0 auto",padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",flexShrink:0}} onClick={goHome}>
            <span style={{color:"#ff4d00",fontSize:16}}>▼</span>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,letterSpacing:3,color:"#fff"}}>DROPZONE</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
            <select style={{background:"#1a1a1a",border:"1px solid #222",borderRadius:7,color:"#888",fontSize:11,padding:"5px 6px",cursor:"pointer",outline:"none"}} value={currency} onChange={e => setCurrency(e.target.value)}>
              <option value="Both">USD+GHS</option>
              <option value="USD">USD ($)</option>
              <option value="GHS">GHS (GH₵)</option>
            </select>
            <button style={{background:"transparent",border:"none",fontSize:20,cursor:"pointer",color:"#fff",position:"relative",lineHeight:1}} onClick={() => setCartOpen(true)}>
              🛒
              {cartCount > 0 && (
                <span style={{position:"absolute",top:-4,right:-6,background:"#ff4d00",color:"#fff",borderRadius:99,fontSize:9,padding:"1px 5px",fontWeight:700,lineHeight:1.4}}>
                  {cartCount}
                </span>
              )}
            </button>
          </div>
        </div>
        <div style={{overflowX:"auto",borderTop:"1px solid #111"}}>
          <div style={{display:"flex",gap:2,padding:"6px 16px",minWidth:"max-content"}}>
            {CATEGORIES.map(c => (
              <button key={c} onClick={() => { setCategory(c); goHome(); }}
                style={{background:"transparent",border:"1px solid " + (category===c&&!selected?"#ff4d00":"transparent"),borderRadius:7,padding:"4px 12px",color:category===c&&!selected?"#ff4d00":"#555",fontSize:11,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap",transition:"all .15s"}}>
                {c}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* CONTENT */}
      {orderDone ? (
        <OrderSuccess onHome={() => { goHome(); setOrderDone(false); }} />
      ) : selected ? (
        <ProductDetail
          p={selected}
          currency={currency}
          onAdd={(p, c) => { addToCart(p, c); }}
          onBack={goHome}
          wishlist={wishlist}
          onWishlist={toggleWishlist}
        />
      ) : (
        <>
          {/* HERO */}
          <div style={{background:"linear-gradient(135deg,#0c0c0c,#150800)",borderBottom:"1px solid #1a1a1a",padding:"40px 20px"}}>
            <div style={{maxWidth:1280,margin:"0 auto"}}>
              <div style={{display:"inline-block",background:"#1a1a1a",border:"1px solid #222",borderRadius:99,padding:"5px 14px",fontSize:11,color:"#777",marginBottom:12}}>
                🇬🇭 Ghana &amp; Worldwide Delivery
              </div>
              <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(36px,8vw,64px)",lineHeight:1,color:"#fff",marginBottom:10,letterSpacing:3}}>
                THE <span style={{color:"#ff4d00"}}>DROP</span> IS HERE.
              </h1>
              <p style={{fontSize:14,color:"#444",maxWidth:400,lineHeight:1.7,marginBottom:20}}>
                Premium gadgets &amp; home tech. Fast delivery worldwide.
              </p>
              <div style={{display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
                {[{n:PRODUCTS.length,l:"Products"},{n:PRODUCTS.filter(p=>p.originalPrice).length,l:"On Sale"},{n:"🌍",l:"Global Ship"}].map((s, i) => (
                  <React.Fragment key={i}>
                    {i > 0 && <div style={{width:1,height:28,background:"#1a1a1a"}} />}
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:"#fff",letterSpacing:1}}>{s.n}</span>
                      <span style={{fontSize:10,color:"#333",textTransform:"uppercase",letterSpacing:1}}>{s.l}</span>
                    </div>
                  </React.Fragment>
                ))}
              </div>
            </div>
          </div>

          {/* FILTERS */}
          <div style={{maxWidth:1280,margin:"0 auto",padding:"16px 16px 8px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <input
              value={search}
              onChange={e => setSearch(e.target.value)}
              placeholder="🔍 Search products..."
              style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:9,padding:"8px 14px",color:"#e2e8f0",fontSize:12,outline:"none",minWidth:180,flex:"1 1 180px",maxWidth:300}}
            />
            <select value={sortBy} onChange={e => setSortBy(e.target.value)}
              style={{background:"#111",border:"1px solid #1e1e1e",borderRadius:9,padding:"8px 12px",color:"#888",fontSize:12,outline:"none",cursor:"pointer"}}>
              <option value="default">Sort: Default</option>
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc">Price: High to Low</option>
              <option value="rating">Top Rated</option>
            </select>
            <span style={{fontSize:11,color:"#333"}}>{filtered.length} products</span>
          </div>

          {/* GRID */}
          <div style={{maxWidth:1280,margin:"0 auto",padding:"8px 16px 40px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:14}}>
            {filtered.map(p => (
              <ProductCard
                key={p.id}
                p={p}
                currency={currency}
                onOpen={openProduct}
                onAdd={addToCart}
                wishlist={wishlist}
                onWishlist={toggleWishlist}
              />
            ))}
            {filtered.length === 0 && (
              <div style={{gridColumn:"1/-1",textAlign:"center",padding:"60px 20px",color:"#333",fontSize:14}}>
                No products found. Try a different search or category.
              </div>
            )}
          </div>

          {/* FOOTER */}
          <div style={{borderTop:"1px solid #111",padding:"24px 20px",textAlign:"center",display:"flex",flexDirection:"column",gap:6}}>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,letterSpacing:3,color:"#222"}}>DROPZONE</span>
            <span style={{fontSize:11,color:"#2a2a2a"}}>© 2025 Dropzone. Premium Gadgets & Home Tech. All rights reserved.</span>
          </div>
        </>
      )}

      {/* CART DRAWER */}
      {cartOpen && (
        <CartDrawer
          cart={cart}
          onClose={() => setCartOpen(false)}
          onRemove={removeFromCart}
          onQty={updateQty}
          currency={currency}
          onCheckout={(ref) => {
            setCart([]);
            setCartOpen(false);
            setOrderDone(true);
            setSelected(null);
            showToast("🎉 Payment confirmed! Ref: " + ref, "#10b981");
          }}
        />
      )}

      {/* TOAST */}
      <Toast toast={toast} />
    </div>
  );
}

/* ── MOUNT ── */
const rootEl = document.getElementById("root");
const root = ReactDOM.createRoot(rootEl);
root.render(React.createElement(App));

</script>
</body>
</html>
